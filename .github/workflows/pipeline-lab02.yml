name: Hello GitHub Actions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  hello-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Executar Hello World
        run: echo " Hello Github Actions "

      - name: Mostrar informações do Sistema
        run: |
          echo " == INFORMAÇÕES DO SISTEMA == "
          echo " 1. Sistema Operacional: ${{ runner.os }}"
          echo " 2. Arquitetura: ${{ runner.arch }}"
          echo " 3. Diretório Atual: $(pwd) "
          echo " 4. Data e Hora: $(date) "
          echo " 5. Usuário: $(whoami) "
          echo " 6. Versão do Node.js: ${{ runner.node.version }}"
          echo " 7. Versão do npm: ${{ runner.npm.version }}"
          echo " 8. Versão do yarn: ${{ runner.yarn.version }}"
          echo " 9. Versão do pnpm: ${{ runner.pnpm.version }}"
          echo " 10. Versão do bun: ${{ runner.bun.version }}"
          echo " 11. Versão do deno: ${{ runner.deno.version }}"

      - name: Listar arquivos do repositório
        run: ls -la

      - name: Comandos múltiplos
        run: |
          echo " == COMANDOS MÚLTIPLOS == "
          echo "Este é o lab02 do curso de Github Actions"
          echo "Workflow executado com sucesso"
          echo "Pronto para os próximos desafios!"