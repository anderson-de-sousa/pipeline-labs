name: "Estrutura de Diretórios e Arquivos 02"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  demonstrando-estrutura:
    name: "Demonstrar Estrutura Básica"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Mostrar estrutura .github/workflows
        run: |
          echo " == ESTRUTURA DE DIRETORIOS E ARQUIVOS .github/workflows == "
          ls -la .github/workflows
          echo ""
          echo " Total de workflows: $(ls -1 .github/workflows/*.y*ml 2>/dev/null | wc -l) "

      - name: Elementos obrigatórios do workflow
        run: |
          echo " == ELEMENTOS OBRIGATÓRIOS DO WORKFLOW == "
          echo " 1. name: Nome do workflow"
          echo " 2. on: Eventos que acionam o workflow"
          echo " 3. env: Variáveis de ambiente"
          echo " 4. jobs: Definição dos trabalhos a serem executados "
          echo " 5. runs-on: Ambiente onde o job será executado "
          echo " 6. steps: Passos individuais dentro de um job "
          echo ""
          echo " Total de elmentos obrigatórios: 6 "
          
      - name: Variáveis e Contexto
        run: |
          echo " == VARIÁVEIS E CONTEXTO == "
          echo " 1. Variáveis de ambiente: Variáveis que podem ser usadas em todo o workflow: ${{ env.NODE_VERSION }}"
          echo " 2. Contextos: Contextos que podem ser usados em todo o workflow: job, runner, etc. "
          echo " 3. Secrets: Secrets que podem ser usados em todo o workflow "
          echo " 4. Environments: Environments que podem ser usados em todo o workflow "
          echo ""
          echo " Total de elmentos obrigatórios: 4 "
